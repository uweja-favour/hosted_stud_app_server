# =========================================================
# BASE APPLICATION CONFIGURATION (SHARED ACROSS ALL PROFILES)
# =========================================================

spring:
  profiles:
    active: dev # Default profile (can override via -Dspring.profiles.active)


  application:
    name: question-generator

  main:
    allow-bean-definition-overriding: false

  # -------------------------------------------------------
  # KAFKA CONFIGURATION (SHARED)
  # This is where Spring Boot EXPECTS Kafka config
  # -------------------------------------------------------
  kafka:
    admin:
      fail-fast: true
      auto-create: false

    bootstrap-servers: pkc-41wq6.eu-west-2.aws.confluent.cloud:9092
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN

      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="45RFFUY3K4VIJ676"
        password="cfltYWjWkOpVGkR1tTKIyOMyDTRP3UfWX3o9rQUm+BwqRsf05UlrVzgGsRvYiwIg";

    # Consumer config → used when receiving messages
    consumer:
      group-id: questions_generator_service_group  # REQUIRED for Kafka listeners
      auto-offset-reset: earliest

      # JSON deserialization config
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"  # Allow all packages (dev-safe, restrict in prod)
        fetch.max.bytes: 209715200
        max.partition.fetch.bytes: 209715200


    # This is to enable very large payloads
    # Producer config → used when sending messages
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.request.size: 209715200
        buffer.memory: 335544320
        compression.type: gzip
        request.timeout.ms: 60000
        delivery.timeout.ms: 120000

# -------------------------------------------------------
# MANAGEMENT / ACTUATOR CONFIG
# -------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

