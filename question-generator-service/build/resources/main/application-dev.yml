# =========================================================
# DEVELOPMENT-ONLY CONFIGURATION
# Overrides application.yml when profile = dev
# =========================================================

# -------------------------------------------------------
# FILE STORAGE
# -------------------------------------------------------
file_manager:
  storage_dir: C:/dev/backend/storage/self_test_quiz_service_storage

# -------------------------------------------------------
# SPRING CONFIGURATION (DEV OVERRIDES)
# -------------------------------------------------------
spring:

  # Enable virtual threads (Java 21 feature)
  threads:
    virtual:
      enabled: true

  # -----------------------------------------------------
  # DATABASE CONFIG
  # -----------------------------------------------------
  data:
    mongodb:
      uri: mongodb+srv://dbUser:Password123Password@cluster0.fiw5cvi.mongodb.net/question_generation_service_db?retryWrites=true&w=majority&appName=Cluster0


  transaction:
    default-timeout: 30s

  # -----------------------------------------------------
  # LOGGING (SQL DEBUGGING ENABLED)
  # -----------------------------------------------------
  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace

  # -----------------------------------------------------
  # WEBFLUX + MEMORY SETTINGS
  # -----------------------------------------------------
  codec:
    max-in-memory-size: 500MB

  webflux:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      read-date-timestamps-as-nanoseconds: true
    time-zone: UTC

  # -----------------------------------------------------
  # SECURITY (RESOURCE SERVER CONFIG)
  # -----------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          accessSecret: asdfsdfarwegrsKLSAHAKBIUUIBuseweDOIy8b_)@#r43243234sadfew23fsxcasdfq32refwasegsade234ew
          refreshSecret: asdijfpeiwrAW3OSI9823JKKSokls0(U2w30(*IUNskajfwke2939sdf9aww9edsafds3wrwaeasdfa34sewe
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json

# -------------------------------------------------------
# RESILIENCE4J CONFIG (AI TIMEOUT)
# -------------------------------------------------------
resilience4j:
  timelimiter:
    instances:
      aiOrchestrator:
        timeout-duration: 1800s
        cancel-running-future: false

# -------------------------------------------------------
# SERVER CONFIG
# -------------------------------------------------------
server:
  port: 8083

# -------------------------------------------------------
# STORAGE (S3)
