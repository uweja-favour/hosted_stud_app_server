version: "3.9"

x-common-labels: &common_labels
  project: classroom-backend

services:
  # -------------------
  # Shared infra
  # -------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: backend_rabbitmq
    labels: *common_labels
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-guest}"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-net

  # -------------------
  # Auth service (example)
  # - uses R2DBC at runtime
  # - waits for its DB and its Flyway migration to complete
  # -------------------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    labels: *common_labels
    depends_on:
      - postgres_auth
      - flyway_auth_migrate
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # JDBC is used only for Flyway; runtime uses R2DBC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_auth:5432/${AUTH_DB:-auth_db}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASS:-auth_pass}
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres_auth:5432/${AUTH_DB:-auth_db}
      SPRING_R2DBC_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_R2DBC_PASSWORD: ${AUTH_DB_PASS:-auth_pass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:8080/.well-known/jwks.json
    ports:
      - "8080:8080"
    networks:
      - backend-net

  # -------------------
  # Template / placeholder: copy the postgres/migration/service blocks for more microservices
  # e.g. postgres_service3, flyway_service3_migrate, service3
  # -------------------

volumes:
  postgres_auth_data:
  postgres_classroom_data:

networks:
  backend-net:
    driver: bridge